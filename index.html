<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Snap and Stick Magnet Co — 2×2" Prints</title>

  <!-- Cropper.js -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>

  <style>
    /* ── Tokens ── */
    :root {
      --bg:       #F7F6F2;
      --surface:  #FFFFFF;
      --border:   #D8D6CF;
      --ink:      #17201F;
      --ink-mid:  #5A6360;
      --ink-dim:  #9CA8A5;
      --accent:   #1A6B5A;   /* deep teal — the one bold choice */
      --accent-h: #145548;
      --danger:   #C0392B;
      --radius:   14px;
      --radius-sm: 8px;
    }

    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      font-size: 16px;
      line-height: 1.5;
      background: var(--bg);
      color: var(--ink);
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Layout shell ── */
    .shell {
      width: 100%;
      max-width: 480px;
      padding: 0 20px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    .site-header {
      padding: 36px 0 28px;
      text-align: center;
    }
    .site-header .eyebrow {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-dim);
      margin-bottom: 10px;
    }
    .site-header h1 {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: clamp(28px, 7vw, 38px);
      font-weight: normal;
      letter-spacing: -0.01em;
      color: var(--ink);
      line-height: 1.1;
    }
    .site-header .sub {
      margin-top: 6px;
      font-size: 13px;
      color: var(--ink-mid);
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 0 2px 0 var(--border), 0 8px 24px rgba(23,32,31,0.06);
      overflow: hidden;
      flex: 1;
      display: flex;
      flex-direction: column;
      margin-bottom: 20px;
    }

    .card-body {
      padding: 28px 24px;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .card-footer {
      border-top: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--bg);
    }
    .step-pip {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--border);
      transition: background 0.2s;
      flex-shrink: 0;
    }
    .step-pip.active { background: var(--accent); }
    .step-label {
      font-size: 12px;
      color: var(--ink-mid);
      margin-left: auto;
    }

    /* ── Upload screen ── */
    #uploadScreen { width: 100%; }

    .drop-zone {
      width: 100%;
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 48px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      text-align: center;
    }
    .drop-zone:hover, .drop-zone:focus-within {
      border-color: var(--accent);
      background: rgba(26,107,90,0.04);
    }

    .drop-icon {
      width: 56px;
      height: 56px;
      border-radius: 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .drop-icon svg { width: 26px; height: 26px; color: var(--ink-mid); }

    .drop-title {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 20px;
      color: var(--ink);
    }
    .drop-hint {
      font-size: 13px;
      color: var(--ink-dim);
      max-width: 240px;
    }

    /* ── Crop screen ── */
    #cropScreen { width: 100%; display: none; flex-direction: column; align-items: center; gap: 14px; }

    .crop-frame {
      width: 100%;
      max-width: 380px;
      aspect-ratio: 1;
      background: var(--ink);
      border-radius: var(--radius-sm);
      overflow: hidden;
    }
    #imageToCrop { display: block; max-width: 100%; }

    .crop-hint {
      font-size: 12px;
      color: var(--ink-dim);
      text-align: center;
      letter-spacing: 0.02em;
    }

    /* ── Success screen ── */
    #successScreen { width: 100%; display: none; flex-direction: column; align-items: center; gap: 0; text-align: center; }

    .success-icon {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: rgba(26,107,90,0.1);
      border: 1.5px solid rgba(26,107,90,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
    }
    .success-icon svg { width: 26px; height: 26px; color: var(--accent); }

    .success-title {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 22px;
      color: var(--ink);
      margin-bottom: 6px;
    }
    .success-sub {
      font-size: 13px;
      color: var(--ink-mid);
      margin-bottom: 28px;
    }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 15px;
      font-weight: 600;
      padding: 14px 24px;
      border-radius: var(--radius-sm);
      border: none;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s, opacity 0.15s;
      text-decoration: none;
      width: 100%;
    }
    .btn:active { transform: scale(0.98); }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:hover { background: var(--accent-h); }

    .btn-dark {
      background: var(--ink);
      color: #fff;
    }
    .btn-dark:hover { background: #0e1514; }

    .btn-ghost {
      background: transparent;
      color: var(--ink-mid);
      font-size: 13px;
      font-weight: 500;
      padding: 10px 0;
      width: auto;
      margin-top: 4px;
    }
    .btn-ghost:hover { color: var(--accent); }

    /* Upload button states */
    .btn-uploading {
      background: #6B7B78;
      color: #fff;
      cursor: not-allowed;
      opacity: 0.8;
      width: 100%;
    }
    .btn-success {
      background: var(--accent);
      color: #fff;
      width: 100%;
    }
    .btn-error {
      background: var(--danger);
      color: #fff;
      width: 100%;
    }

    /* hidden — cropScreen needs flex when visible */
    .hidden { display: none !important; }
    #cropScreen:not(.hidden) { display: flex; }
    #successScreen:not(.hidden) { display: flex; }

    /* ── Cropper overrides ── */
    .cropper-view-box, .cropper-face { border-radius: 4px; }
    .cropper-line, .cropper-point { background-color: var(--accent); }
    .cropper-point { opacity: 0.9; }

    /* ── Footer ── */
    .site-footer {
      padding: 0 0 28px;
      width: 100%;
      max-width: 480px;
    }

    /* ── Reduced motion ── */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { transition: none !important; animation: none !important; }
    }
  </style>
</head>

<body>
  <div class="shell">

    <header class="site-header">
      <svg width="200" height="160" viewBox="0 0 680 200" role="img" xmlns="http://www.w3.org/2000/svg" style="display:block;margin:0 auto 4px;">
        <title>Snap and Stick Magnet Co</title>
        <desc>Refined botanical branch logo for Snap and Stick Magnet Co</desc>
        <path d="M295 25 Q297 70 295 128" fill="none" stroke="#1A6B5A" stroke-width="2" stroke-linecap="round"/>
        <path d="M295 48 Q268 34 264 22 Q264 18 268 20 Q282 28 295 48Z" fill="#1A6B5A"/>
        <path d="M295 48 Q278 35 268 22" fill="none" stroke="#145548" stroke-width="0.9" stroke-linecap="round"/>
        <path d="M285 41 Q278 37 274 32" fill="none" stroke="#145548" stroke-width="0.5" stroke-linecap="round" opacity="0.7"/>
        <path d="M278 36 Q273 33 270 28" fill="none" stroke="#145548" stroke-width="0.5" stroke-linecap="round" opacity="0.7"/>
        <path d="M295 62 Q324 47 328 35 Q328 31 324 33 Q309 42 295 62Z" fill="#145548"/>
        <path d="M295 62 Q312 48 328 35" fill="none" stroke="#0e3d34" stroke-width="0.9" stroke-linecap="round"/>
        <path d="M306 54 Q313 49 318 42" fill="none" stroke="#0e3d34" stroke-width="0.5" stroke-linecap="round" opacity="0.7"/>
        <path d="M313 49 Q318 45 321 39" fill="none" stroke="#0e3d34" stroke-width="0.5" stroke-linecap="round" opacity="0.7"/>
        <path d="M294 82 Q260 72 252 56 Q258 52 264 56 Q280 66 294 82Z" fill="#1A6B5A"/>
        <path d="M294 82 Q272 68 252 56" fill="none" stroke="#145548" stroke-width="0.9" stroke-linecap="round"/>
        <path d="M280 75 Q269 69 261 61" fill="none" stroke="#145548" stroke-width="0.5" stroke-linecap="round" opacity="0.7"/>
        <path d="M270 70 Q262 65 256 59" fill="none" stroke="#145548" stroke-width="0.5" stroke-linecap="round" opacity="0.7"/>
        <path d="M294 98 Q330 86 338 70 Q332 66 326 70 Q310 80 294 98Z" fill="#145548"/>
        <path d="M294 98 Q316 83 338 70" fill="none" stroke="#0e3d34" stroke-width="0.9" stroke-linecap="round"/>
        <path d="M308 90 Q319 83 328 75" fill="none" stroke="#0e3d34" stroke-width="0.5" stroke-linecap="round" opacity="0.7"/>
        <path d="M318 84 Q326 78 333 72" fill="none" stroke="#0e3d34" stroke-width="0.5" stroke-linecap="round" opacity="0.7"/>
        <path d="M293 114 Q268 106 262 94 Q268 90 273 95 Q284 104 293 114Z" fill="#1A6B5A"/>
        <path d="M293 114 Q275 103 262 94" fill="none" stroke="#145548" stroke-width="0.9" stroke-linecap="round"/>
        <path d="M281 108 Q272 103 266 97" fill="none" stroke="#145548" stroke-width="0.5" stroke-linecap="round" opacity="0.6"/>
        <path d="M295 25 Q291 18 295 12 Q299 18 295 25Z" fill="#145548"/>
        <path d="M295 25 Q289 16 293 10 Q291 16 295 25Z" fill="#1A6B5A" opacity="0.7"/>
        <ellipse cx="295" cy="131" rx="3.5" ry="5" fill="#145548"/>
        <text x="295" y="158" text-anchor="middle" font-family="Georgia,'Times New Roman',serif" font-size="26" font-weight="normal" fill="#17201F" letter-spacing="-0.3">Snap &amp; Stick Magnet Co.</text>
        <line x1="168" y1="166" x2="422" y2="166" stroke="#1A6B5A" stroke-width="1.2"/>
        <text x="295" y="182" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="11" font-weight="600" fill="#9CA8A5" letter-spacing="0.12em">PERSONALIZED KEEPSAKE MAGNETS</text>
      </svg>
    </header>

    <main>
      <div class="card">
        <div class="card-body">

          <!-- Upload -->
          <div id="uploadScreen">
            <label class="drop-zone">
              <div class="drop-icon">
                <svg fill="none" stroke="currentColor" stroke-width="1.75" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round"
                    d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                </svg>
              </div>
              <span class="drop-title">Choose or snap a photo</span>
              <span class="drop-hint">Camera roll or live camera — any image works</span>
              <input type="file" id="imageInput" accept="image/*" style="display:none">
            </label>
          </div>

          <!-- Crop -->
          <div id="cropScreen" class="hidden">
            <div class="crop-frame">
              <img id="imageToCrop">
            </div>
            <p class="crop-hint">Drag to position · pinch or scroll to resize</p>
          </div>

          <!-- Success -->
          <div id="successScreen" class="hidden">
            <div class="success-icon">
              <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
              </svg>
            </div>
            <h2 class="success-title">Photo locked in</h2>

            <input type="text" id="nameInput" placeholder="Enter your name" style="
              width: 100%;
              padding: 12px 16px;
              border: 1px solid var(--border);
              border-radius: var(--radius-sm);
              font-size: 15px;
              color: var(--ink);
              background: var(--bg);
              margin-bottom: 12px;
              outline: none;
            ">
            <button id="uploadSubmitBtn" class="btn btn-dark">
              Upload to Google Drive
            </button>
            <button id="resetBtn" class="btn btn-ghost">← Start over</button>
          </div>

        </div>

        <!-- Card footer: step indicator -->
        <div class="card-footer">
          <div class="step-pip active" id="pip1"></div>
          <div class="step-pip"       id="pip2"></div>
          <div class="step-pip"       id="pip3"></div>
          <span class="step-label" id="stepLabel">Step 1 of 3 — Choose photo</span>
        </div>
      </div>
    </main>

  </div>

  <!-- Sticky crop button lives outside the card so it's always reachable -->
  <footer class="site-footer" style="padding-left:20px;padding-right:20px;">
    <button id="cropBtn" class="btn btn-primary hidden">
      Lock layout &amp; crop
    </button>
  </footer>

  <script src="app.js"></script>

  <!-- Step indicator wiring (self-contained, doesn't need app.js) -->
  <script>
    const pip1 = document.getElementById('pip1');
    const pip2 = document.getElementById('pip2');
    const pip3 = document.getElementById('pip3');
    const stepLabel = document.getElementById('stepLabel');

    function setStep(n) {
      [pip1, pip2, pip3].forEach((p, i) => p.classList.toggle('active', i < n));
      const labels = ['Step 1 of 3 — Choose photo', 'Step 2 of 3 — Crop image', 'Step 3 of 3 — Ready to upload'];
      stepLabel.textContent = labels[n - 1] || '';
    }

    // Hook into screen visibility changes to update the indicator
    const observer = new MutationObserver(() => {
      const upload  = document.getElementById('uploadScreen');
      const crop    = document.getElementById('cropScreen');
      const success = document.getElementById('successScreen');
      if (success && success.style.display !== 'none' && !success.classList.contains('hidden')) setStep(3);
      else if (crop && crop.style.display !== 'none' && !crop.classList.contains('hidden')) setStep(2);
      else setStep(1);
    });
    observer.observe(document.querySelector('.card-body'), { childList: false, subtree: true, attributes: true, attributeFilter: ['style', 'class'] });
  </script>
</body>
</html>
